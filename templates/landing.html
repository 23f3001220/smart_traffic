<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f172a;
    --acc1: #3b82f6;
    --acc2: #10b981;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --font-ui: 'Rajdhani', sans-serif;
    --font-hd: 'Exo 2', sans-serif;
  }
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: var(--font-ui);
    background-color: var(--bg-dark);
    color: var(--text);
    overflow: hidden;
  }
  /* Dynamic Background */
  .bg-animation {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
    z-index: -1;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    animation: float 10s infinite ease-in-out alternate;
  }
  .orb-1 { width: 300px; height: 300px; background: var(--acc1); top: 10%; left: 20%; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: var(--acc2); bottom: 10%; right: 20%; animation-delay: -5s; }

  @keyframes float {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-50px) scale(1.1); }
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .title {
    font-family: var(--font-hd);
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(to right, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 1.25rem;
    color: var(--text-muted);
    max-width: 600px;
    margin-bottom: 50px;
    line-height: 1.6;
  }

  .portal-cards {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 40px 30px;
    width: 280px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card:hover {
    transform: translateY(-10px);
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .icon {
    font-size: 3rem;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: var(--font-hd);
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .card-desc {
    font-size: 1rem;
    color: var(--text-muted);
    margin-bottom: 25px;
  }
  
  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: none;
    cursor: pointer;
    transition: background 0.3s;
    font-family: var(--font-ui);
  }

  .btn-admin {
    background: var(--acc1);
    color: #fff;
  }
  .card:hover .btn-admin { background: #2563eb; }

  .btn-user {
    background: var(--acc2);
    color: #fff;
  }
  .card:hover .btn-user { background: #059669; }

</style>
</head>
<body>

<div class="bg-animation">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="container">
  <div class="title">CodeMind Traffic Intelligence</div>
  <div class="subtitle">Welcome to the Smart Traffic Management System. Select your portal to continue.</div>

  <div class="portal-cards">
    <a href="/admin_login" class="card">
      <div class="icon">💼</div>
      <div class="card-title">Admin Portal</div>
      <div class="card-desc">System configuration, AI monitoring, and control overrides.</div>
      <button class="btn btn-admin">Admin Login</button>
    </a>

    <a href="/user_login" class="card">
      <div class="icon">🚗</div>
      <div class="card-title">Commuter Portal</div>
      <div class="card-desc">Real-time routing, traffic alerts, and travel estimations.</div>
      <button class="btn btn-user">User Login</button>
    </a>
  </div>
</div>

</body>
</html>
