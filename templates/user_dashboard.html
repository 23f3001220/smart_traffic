<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STMS · Route Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f4f7f6;
    --bg2:      #ffffff;
    --bg3:      #f0f3f5;
    --panel:    rgba(255, 255, 255, 0.95);
    --border:   #e0e6ed;
    --accent:   #0a66c2;
    --accent2:  #e27129;
    --green:    #10b981;
    --red:      #ef4444;
    --yellow:   #f59e0b;
    --text:     #1f2937;
    --text2:    #6b7280;
    --glow:     0 8px 30px rgba(0,0,0,0.06);
    --font-hd:  'Exo 2', sans-serif;
    --font-mono:'Share Tech Mono', monospace;
    --font-ui:  'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    margin: 0; padding: 0; width: 100%; height: 100vh;
    font-family: var(--font-ui);
    color: var(--text);
    overflow: hidden;
    background: var(--bg);
  }

  /* ── BACKGROUND MAP ── */
  #traffic-map {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 10;
  }

  /* Moves Leaflet Zoom controls to bottom right avoiding sidebar */
  .leaflet-control-zoom {
    border: 1px solid var(--border) !important;
  }
  .leaflet-bar a {
    background-color: var(--bg2) !important;
    color: var(--text) !important;
    border-bottom: 1px solid var(--border) !important;
  }
  .leaflet-bar a:hover {
    background-color: var(--border) !important;
    color: var(--accent) !important;
  }

  /* ══ FLOATING HEADER ══ */
  .topbar {
    position: absolute; top: 16px; right: 16px;
    z-index: 100;
    display: flex; align-items: center; justify-content: flex-end; gap: 12px;
    background: var(--panel);
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .nav-btn {
    padding: 6px 12px; border-radius: 4px; border: 1px solid transparent;
    color: var(--text2); font-weight: 600; text-decoration: none; cursor: pointer;
    transition: all .2s;
  }
  .nav-btn:hover { background: rgba(0,212,255,0.06); color: var(--accent); border-color: var(--accent); }

  /* ══ SIDEBAR (GOOGLE MAPS STYLE) ══ */
  .sidebar {
    position: absolute; top: 16px; left: 16px; bottom: 16px;
    width: 380px; z-index: 100;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    display: flex; flex-direction: column;
    backdrop-filter: blur(16px) saturate(1.4);
    overflow: hidden;
  }

  /* ── BRANDING ── */
  .sidebar-header {
    padding: 20px; border-bottom: 1px solid var(--border);
    background: rgba(0,212,255,0.03);
    display: flex; align-items: center; gap: 12px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #0066aa);
    border-radius: 6px; display: grid; place-items: center;
    font-size: 18px; box-shadow: var(--glow);
  }
  .brand-name { font-family: var(--font-hd); font-weight: 800; font-size: 20px; letter-spacing: 2px; color: var(--text); }
  .brand-name span { color: var(--accent); }

  /* ── PLANNER INPUTS ── */
  .planner-box { padding: 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px;}
  
  .input-wrapper {
    display: flex; flex-direction: column; gap: 4px; position: relative;
  }
  .input-wrapper label { font-size: 11px; color: var(--text2); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
  select {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    padding: 12px; border-radius: 6px; outline: none; font-family: var(--font-ui); font-size: 15px; font-weight: 500;
    transition: 0.2s; width: 100%; appearance: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,0.2); }

  /* Target Icon indicator */
  .route-dots {
    position: absolute; left: 16px; top: 120px; bottom: 175px; width: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--green));
    display: none; z-index: 1;
  }

  /* ── RESULTS AREA ── */
  .sidebar-content { flex: 1; overflow-y: auto; padding: 0; }
  
  /* Scrollbar */
  .sidebar-content::-webkit-scrollbar { width: 4px; }
  .sidebar-content::-webkit-scrollbar-track { background: transparent; }
  .sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── CARDS ── */
  .result-pane { padding: 20px; }
  .empty-state { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 14px; }

  .route-status-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 16px;
  }
  .time-lg { font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; font-family: var(--font-hd); margin-bottom: 4px;}
  
  .ai-insight {
    background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-left: 3px solid var(--accent);
    padding: 16px; border-radius: 6px; margin-bottom: 16px;
  }
  .ai-header { font-weight: 700; font-size: 12px; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; display: flex; gap:6px; align-items:center; }

  .alert-item {
    display: flex; gap: 12px; padding: 12px; border-bottom: 1px solid var(--border);
  }
  .alert-loc { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom:4px; display:flex; align-items:center; justify-content:space-between; }
  .alert-msg { font-size: 13px; color: var(--text2); }

  /* ── BADGE ── */
  .badge {
    padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; letter-spacing: 1px; font-family: var(--font-mono); height:fit-content;
  }
  .badge.HIGH   { background: rgba(255,45,85,.15); color: var(--red); border: 1px solid rgba(255,45,85,.3); }
  .badge.MEDIUM { background: rgba(255,204,0,.15); color: var(--yellow); border: 1px solid rgba(255,204,0,.3); }
  .badge.LOW    { background: rgba(0,255,136,.15); color: var(--green); border: 1px solid rgba(0,255,136,.3); }

</style>
</head>
<body>

<!-- Map Container -->
<div id="traffic-map"></div>

<!-- Top Right Header -->
<div class="topbar">
  <div style="font-size: 13px; color: var(--text); padding-right: 8px;"><b>{{ current_user.username }}</b></div>
  <button class="nav-btn" onclick="refreshData()">REFRESH</button>
  <a href="/logout" class="nav-btn" style="color: var(--red);">LOGOUT</a>
</div>

<!-- Left Sidebar (Google Maps style) -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="brand-icon" style="color:#fff; font-family:var(--font-mono); font-weight:bold; font-size:16px;">U</div>
    <div class="brand-name">ST<span>MS</span></div>
  </div>

  <div class="planner-box">
    <div class="input-wrapper">
      <label>1. Start Location</label>
      <select id="start-selector" onchange="refreshData()">
        <option value="">-- Choose Origin --</option>
      </select>
    </div>
    
    <div style="height: 12px; display:flex; justify-content:center; opacity:0.5;">
      <div style="width:2px; height:100%; background:var(--border);"></div>
    </div>

    <div class="input-wrapper">
      <label>2. Destination</label>
      <select id="end-selector" onchange="refreshData()">
        <option value="">-- Choose Destination --</option>
      </select>
    </div>
  </div>

  <div class="sidebar-content" id="sidebar-results">
    <!-- Active Route data or Available Routes list goes here -->
    <div class="result-pane">
       <div class="empty-state">Select a Start and Destination above to generate route path and analytics.</div>
       <div id="quick-routes"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = '/api';
let trafficMap = null;
let mapLayerGroup = null;
let routeLineGroup = null;

function initMap() {
  trafficMap = L.map('traffic-map', {zoomControl: false}).setView([30.9, 75.85], 13);
  L.control.zoom({position: 'bottomright'}).addTo(trafficMap);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(trafficMap);
  mapLayerGroup = L.layerGroup().addTo(trafficMap);
  routeLineGroup = L.layerGroup().addTo(trafficMap);
}
document.addEventListener('DOMContentLoaded', initMap);

async function apiFetch(path) {
  const r = await fetch(API + path);
  return r.json();
}

// 1. Populate Dropdowns
async function loadLocations() {
  const locs = await apiFetch('/routes/locations');
  const selStart = document.getElementById('start-selector');
  const selEnd = document.getElementById('end-selector');
  locs.forEach(l => {
    selStart.appendChild(new Option(l, l));
    selEnd.appendChild(new Option(l, l));
  });
}

// 2. Load Quick Overview (when no specific route selected)
async function renderQuickRoutes() {
  const d = await apiFetch('/routes');
  const el = document.getElementById('quick-routes');
  if(!el) return;
  if(!d.routes || d.routes.length === 0) {
    el.innerHTML = ''; return;
  }
  
  let html = `<div style="font-size:11px; font-weight:700; color:var(--text2); letter-spacing:1px; margin-bottom:12px; margin-top:20px;">QUICK LIVE ROUTES</div>`;
  html += d.routes.slice(0, 10).map(r => `
    <div style="padding:10px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; margin-bottom:8px; cursor:pointer;"
         onclick="quickSelect('${r.start_point}','${r.end_point}')">
      <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
        <span style="font-size:13px; font-weight:600;">${r.travel_time} min</span>
        <span class="badge ${r.traffic_status}">${r.traffic_status}</span>
      </div>
      <div style="font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
        ${r.start_point} ➝ ${r.end_point}
      </div>
    </div>
  `).join('');
  el.innerHTML = html;
}

window.quickSelect = function(start, end) {
  document.getElementById('start-selector').value = start;
  document.getElementById('end-selector').value = end;
  refreshData();
};

// 3. Core Logic
async function refreshData() {
  const start = document.getElementById('start-selector').value;
  const end = document.getElementById('end-selector').value;
  const resultsDiv = document.getElementById('sidebar-results');
  
  if (!start || !end || start === end) {
    // Show quick routes
    resultsDiv.innerHTML = `<div class="result-pane"><div class="empty-state" style="padding-bottom:10px;">Select a Start and Destination above to generate your route.</div><div id="quick-routes"></div></div>`;
    renderQuickRoutes();
    
    // Draw all points on map
    const locsRes = start ? await apiFetch(`/analyze/${encodeURIComponent(start)}`) : await apiFetch('/analyze');
    drawMapNodes(locsRes.analysis || (locsRes.error ? [] : [locsRes]));
    return;
  }
  
  // Both Selected -> Optimal Path
  resultsDiv.innerHTML = `<div class="empty-state">Calculating optimal route...</div>`;
  
  const res = await apiFetch(`/routes/recommend?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
  
  if(res.error) {
    resultsDiv.innerHTML = `<div class="empty-state">No route connection found.</div>`;
    return;
  }
  
  let html = `<div class="result-pane">`;
  
  // Big Status Card
  html += `
    <div class="route-status-card">
      <div class="time-lg">${Number(res.estimated_travel_time_min || 0).toFixed(0)} min</div>
      <div style="font-size:14px; color:var(--text2); margin-bottom:12px;">Distance: ${Number(res.total_distance_km || 0).toFixed(1)} km</div>
      <div style="font-size:12px; color:var(--text); line-height:1.6; font-family:var(--font-mono);">
        <span style="color:var(--text2)">Via:</span> ${res.recommended_path.join(' ➝ ')}
      </div>
    </div>
  `;
  
  // AI Insight
  if(res.ai_advice) {
    html += `
      <div class="ai-insight">
        <div class="ai-header">GEMINI ALGORITHM</div>
        <div style="font-size:13px; color:var(--text); line-height:1.5;">${res.ai_advice}</div>
      </div>
    `;
  }
  
  // Reports Filtered by Route
  const allRpts = await apiFetch('/reports');
  const filtered = (allRpts.reports || []).filter(r => res.recommended_path.includes(r.location));
  
  if(filtered.length > 0) {
    html += `<div style="font-size:11px; font-weight:700; color:var(--text2); letter-spacing:1px; margin: 20px 0 10px;">ALERTS EN ROUTE</div>`;
    html += `<div style="border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--bg2);">`;
    html += filtered.map(r => {
      const bColor = r.congestion_level === 'HIGH' ? 'var(--red)' : (r.congestion_level === 'MEDIUM' ? 'var(--yellow)' : 'var(--green)');
      return `
      <div class="alert-item" style="display:flex; gap:12px; padding:12px; border-bottom:1px solid var(--border);">
        <div style="width:4px; border-radius:2px; background:${bColor};"></div>
        <div style="flex:1;">
          <div class="alert-loc">${r.location} <span class="badge ${r.congestion_level}">${r.congestion_level}</span></div>
          <div class="alert-msg">${r.alert_message}</div>
        </div>
      </div>`}).join('');
    html += `</div>`;
  }
  
  html += `</div>`; // end result-pane
  resultsDiv.innerHTML = html;
  
  // Plot Map
  const analysisData = await apiFetch('/analyze');
  const pathNodes = (analysisData.analysis || []).filter(n => res.recommended_path.includes(n.location));
  drawMapNodes(pathNodes, res.recommended_path);
}

function drawMapNodes(nodes, pathOrder = null) {
  if (!trafficMap) return;
  mapLayerGroup.clearLayers();
  routeLineGroup.clearLayers();
  
  const colors = { HIGH: '#ff2d55', MEDIUM: '#ffcc00', LOW: '#00ff88' };
  let hasLocation = false;
  let latLngs = {};
  
  nodes.forEach(r => {
    if (r.latitude && r.longitude) {
      hasLocation = true;
      latLngs[r.location] = [r.latitude, r.longitude];
      L.circleMarker([r.latitude, r.longitude], {
        radius: pathOrder ? 9 : 12, fillColor: colors[r.congestion_level],
        color: colors[r.congestion_level], weight: 2, opacity: 0.9, fillOpacity: 0.6
      }).addTo(mapLayerGroup).bindTooltip(`<b>${r.location}</b>`, {permanent: false, direction: 'top'});
    }
  });

  if (pathOrder && pathOrder.length > 1) {
    const coords = [];
    pathOrder.forEach(loc => {
      if(latLngs[loc]) coords.push(latLngs[loc]);
    });
    if(coords.length > 1) {
      // Glow background
      L.polyline(coords, {color: '#00aaff', weight: 8, opacity: 0.2}).addTo(routeLineGroup);
      // Core line
      L.polyline(coords, {color: '#00d4ff', weight: 4, opacity: 0.9, dashArray:'10, 10'}).addTo(routeLineGroup);
    }
  }

  if (hasLocation && nodes.length === 1 && nodes[0].latitude) {
    trafficMap.setView([nodes[0].latitude, nodes[0].longitude], 15);
  } else if (hasLocation && nodes.length > 1) {
    let bounds = new L.LatLngBounds();
    nodes.forEach(n => bounds.extend([n.latitude, n.longitude]));
    // Padding specifically added to bottom/left to avoid sidebar!
    trafficMap.fitBounds(bounds, {paddingTopLeft: [400, 50], paddingBottomRight: [50, 50]});
  } else {
    trafficMap.setView([30.9, 75.85], 13);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadLocations().then(refreshData);
  setInterval(refreshData, 30000);
});
</script>
</body>
</html>
