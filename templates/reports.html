<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STMS · Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f7f6;--bg2:#ffffff;--panel:rgba(255,255,255,0.95);--border:#e0e6ed;--accent:#0a66c2;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#1f2937;--text2:#6b7280;--font-hd:'Exo 2',sans-serif;--font-mono:'Share Tech Mono',monospace;--font-ui:'Rajdhani',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;animation:gridDrift 20s linear infinite}
  @keyframes gridDrift{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}
  .particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:floatP linear infinite}
  @keyframes floatP{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.5}90%{opacity:.5}100%{opacity:0;transform:translateY(-10vh) scale(1)}}
  .wrapper{position:relative;z-index:1}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:rgba(8,15,24,.85);border-bottom:1px solid var(--border);backdrop-filter:blur(20px) saturate(1.4);position:sticky;top:0;z-index:100;animation:slideDown .5s cubic-bezier(.16,1,.3,1)}
  @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#0066aa);border-radius:6px;display:grid;place-items:center;font-size:18px;animation:brandPulse 3s ease-in-out infinite}
  @keyframes brandPulse{0%,100%{box-shadow:0 0 15px rgba(0,212,255,.3)}50%{box-shadow:0 0 25px rgba(0,212,255,.6)}}
  .brand-name{font-family:var(--font-hd);font-weight:800;font-size:20px;letter-spacing:2px;color:var(--text)}.brand-name span{color:var(--accent)}
  nav{display:flex;gap:4px}
  .nav-btn{padding:6px 16px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text2);font-family:var(--font-ui);font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;text-decoration:none;transition:all .25s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
  .nav-btn::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:var(--accent);transition:all .3s;transform:translateX(-50%)}
  .nav-btn:hover::after,.nav-btn.active::after{width:80%}
  .nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06)}

  .content{padding:28px;max-width:1200px;margin:0 auto}
  .page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;animation:fadeInUp .5s ease}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .page-title{font-family:var(--font-hd);font-size:26px;font-weight:800;letter-spacing:2px}.page-title span{color:var(--accent)}

  .btn{padding:9px 20px;border-radius:6px;border:none;font-family:var(--font-ui);font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);display:inline-flex;align-items:center;gap:6px;position:relative;overflow:hidden}
  .btn::after{content:'';position:absolute;width:100%;height:100%;top:0;left:0;background:radial-gradient(circle,rgba(255,255,255,.2)10%,transparent 10%);transform:scale(10);opacity:0;transition:transform .5s,opacity .5s}
  .btn:active::after{transform:scale(0);opacity:1;transition:0s}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 10px 30px rgba(0,0,0,0.06)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,255,.5)}
  .btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}

  /* Filter bar */
  .filter-bar{display:flex;gap:10px;margin-bottom:20px;align-items:center;animation:fadeInUp .5s .1s ease backwards}
  .filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font-ui);font-size:13px;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
  .filter-btn::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(0,212,255,.08),transparent);opacity:0;transition:opacity .3s}
  .filter-btn:hover::before,.filter-btn.active::before{opacity:1}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08)}
  .filter-btn:hover{border-color:rgba(0,212,255,.5);color:var(--accent)}

  /* Report cards */
  .reports-grid{display:flex;flex-direction:column;gap:12px}
  .report-card{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;
    display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;
    transition:all .3s cubic-bezier(.16,1,.3,1);
    animation:reportSlide .5s cubic-bezier(.16,1,.3,1) backwards;position:relative;overflow:hidden;
  }
  .report-card::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.02),transparent)}
  .report-card:hover::after{animation:shimmer .8s ease}
  @keyframes shimmer{to{left:100%}}
  .report-card:hover{transform:translateX(6px);box-shadow:0 4px 20px rgba(0,0,0,.3);border-color:rgba(0,212,255,.2)}
  @keyframes reportSlide{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  .report-card.HIGH{border-left:3px solid var(--red)}
  .report-card.MEDIUM{border-left:3px solid var(--yellow)}
  .report-card.LOW{border-left:3px solid var(--green)}
  .rc-icon{font-size:28px;line-height:1;transition:transform .3s}
  .report-card:hover .rc-icon{transform:scale(1.2)}
  .rc-loc{font-weight:700;font-size:15px;color:var(--text);margin-bottom:4px}
  .rc-msg{font-size:12px;color:var(--text2);line-height:1.5;margin-top:6px}
  .rc-time{font-family:var(--font-mono);font-size:11px;color:var(--text2)}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;font-family:var(--font-mono);transition:transform .2s}
  .badge:hover{transform:scale(1.1)}
  .badge.HIGH{background:rgba(255,45,85,.15);color:var(--red);border:1px solid rgba(255,45,85,.3)}
  .badge.MEDIUM{background:rgba(255,204,0,.15);color:var(--yellow);border:1px solid rgba(255,204,0,.3)}
  .badge.LOW{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
  .emg-badge{display:inline-block;padding:2px 8px;background:rgba(255,45,85,.3);color:var(--red);border-radius:4px;font-size:10px;font-weight:700;letter-spacing:2px;margin-left:8px;animation:emgPulse 1.5s infinite}
  @keyframes emgPulse{0%,100%{opacity:1}50%{opacity:.5}}

  .spinner{width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,212,255,.2);border-top-color:var(--accent);animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  #toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
  .toast{background:rgba(10,21,32,.95);border:1px solid var(--border);backdrop-filter:blur(12px);border-radius:10px;padding:14px 18px;min-width:300px;display:flex;align-items:center;gap:10px;animation:toastIn .4s cubic-bezier(.16,1,.3,1);font-size:13px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
  .toast.success{border-left:3px solid var(--green)}.toast.info{border-left:3px solid var(--accent)}
  .toast.exiting{animation:toastOut .3s ease forwards}
  @keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes toastOut{to{transform:translateX(120%);opacity:0}}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="wrapper">
<div class="topbar">
  <div class="brand"><div class="brand-icon" style="color:#fff; font-family:var(--font-mono); font-weight:bold; font-size:16px;">RP</div><div class="brand-name">ST<span>MS</span></div></div>
  <nav>
    <a href="/" class="nav-btn">DASHBOARD</a>
    <a href="/signals" class="nav-btn">SIGNALS</a>
    <a href="/routes-page" class="nav-btn">ROUTES</a>
    <a href="/reports-page" class="nav-btn active">REPORTS</a>
    <a href="/emergency-page" class="nav-btn">EMERGENCY</a>
  </nav>
  <div></div>
</div>
<div class="content">
  <div class="page-hd">
    <div class="page-title">TRAFFIC <span>REPORTS</span></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" onclick="generateReports()">Generate Reports</button>
      <button class="btn btn-primary" onclick="loadReports()">Refresh</button>
    </div>
  </div>
  <div class="filter-bar">
    <select id="timeframe-sel" onchange="loadReports()" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:20px;font-family:var(--font-ui);font-size:13px;outline:none;cursor:pointer;">
      <option value="24h">Last 24 Hours</option>
      <option value="48h">Last 2 Days</option>
      <option value="5d">Last 5 Days</option>
      <option value="7d">Last Week</option>
      <option value="all">All History</option>
    </select>
    <div style="width:1px;height:24px;background:var(--border);margin:0 4px;"></div>
    <button class="filter-btn active" onclick="filterReports('all',this)">All</button>
    <button class="filter-btn" onclick="filterReports('HIGH',this)">High</button>
    <button class="filter-btn" onclick="filterReports('MEDIUM',this)">Medium</button>
    <button class="filter-btn" onclick="filterReports('LOW',this)">Low</button>
    <button class="filter-btn" onclick="filterReports('emergency',this)">Emergency</button>
  </div>
  <div class="reports-grid" id="reports-grid">
    <div style="text-align:center;padding:60px;color:var(--text2)"><div class="spinner" style="margin:auto"></div><p style="margin-top:12px">Loading reports…</p></div>
  </div>
</div>
</div>
<div id="toast-container"></div>
<script>
(function(){const c=document.getElementById('particles');for(let i=0;i<25;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*15)+'s';p.style.animationDelay=(Math.random()*10)+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';c.appendChild(p)}})();

let allReports=[];
function toast(msg,type='info') { return; }

function renderReports(reports){
  const grid=document.getElementById('reports-grid');
  if(!reports||reports.length===0){
    grid.innerHTML=`<div style="text-align:center;padding:60px;color:var(--text2)"><p>No reports found in this timeframe. Click Generate Reports.</p></div>`;
    return;
  }
  grid.innerHTML=reports.map((r,i)=>`
    <div class="report-card ${r.congestion_level}" style="animation-delay:${i*50}ms">
      <div class="rc-icon"></div>
      <div>
        <div class="rc-loc">${r.location} <span class="badge ${r.congestion_level}">${r.congestion_level}</span>${r.is_emergency?'<span class="emg-badge">EMERGENCY</span>':''}</div>
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--text2);margin-top:4px">${r.vehicle_count} vehicles · ${r.avg_speed} km/h avg</div>
        <div class="rc-msg">${r.alert_message}</div>
        ${r.ai_analysis?`<div class="rc-msg" style="color:var(--accent);margin-top:6px;border-top:1px solid rgba(0,212,255,.1);padding-top:6px">AI: ${r.ai_analysis}</div>`:''}
      </div>
      <div class="rc-time">${new Date(r.generated_time).toLocaleString()}</div>
    </div>`).join('');
}

function filterReports(type,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(type==='all') renderReports(allReports);
  else if(type==='emergency') renderReports(allReports.filter(r=>r.is_emergency));
  else renderReports(allReports.filter(r=>r.congestion_level===type));
}

async function loadReports(){
  const tf = document.getElementById('timeframe-sel') ? document.getElementById('timeframe-sel').value : '24h';
  const d=await fetch('/api/reports?timeframe=' + tf).then(r=>r.json());
  allReports=d.reports||[];
  renderReports(allReports);
}

async function generateReports(){
  toast('Generating reports…','info');
  const d=await fetch('/api/reports/generate',{method:'POST'}).then(r=>r.json());
  toast(`Generated ${d.count} reports`,'success');
  loadReports();
}

loadReports();
setInterval(loadReports,30000);
</script>
<style>@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}</style>
</body>
</html>
